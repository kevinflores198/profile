<body>
    <header>
        <div class="logo">
            <img src="" alt="Logo nav">
        </div>
        <nav>
            <ul>
                <li>
                    <a id="nav-about" href="#profile"></a>
                    <a id="nav-projects" href="#projects"></a>
                    <a id="nav-studies" href="#studies"></a>
                    <a id="nav-resume" href="#resume"></a>
                    <a id="nav-references" href="#references"></a>

        <button id="theme-toggle" class="theme-toggle">🌙</button>
        <div class="burger"></div>
    </header>
    <main>
        <section id="profile">
            <div class="content">
                <div class="photo">
                    <img src="" alt="profile picture">
                </div>
                <div class="name">
                    <h1 id="profile-name"></h1>
                    <h3 id="profile-role"></h3>
                </div>
                <div class="about">
                    <p id="profile-about"></p>
                </div>
                <div class="button">
                    <a href="" id="profile-contact"></a>
                </div>
            </div>
        </section>

        <section id="projects">
            <div class="content">
                <div class="cards">
                    <h2 id="projects-title"></h2>
                    <article class="card-project">
                        <h3 id="project1-title"></h3>
                        <h4 id="project1-exp"></h4>
                        <div class="button">
                            <a href="" id="project1-btn"></a>

                    <article class="card-project">
                        <h3 id="project2-title"></h3>
                        <h4 id="project2-exp"></h4>

                            <a href="" id="project2-btn"></a>

                    </article>
                    <article class="card-project">
                        <h3 id="project3-title"></h3>
                        <h4 id="project3-exp"></h4>
                        <div class="button">
                            <a href="" id="project3-btn"></a>
                        </div>
                    </article>
                </div>
                <div class="service-budget">
                    <h2 id="quote-title"></h2>
                    <div class="button">
                        <a href="" id="quote-btn"></a>
                    </div>
                    <details>
                        <summary id="quote-terms"></summary>
                        <ul>
                            <li id="quote-li1"></li>
                            <li id="quote-li2"></li>
                            <li id="quote-li3"></li>
                            <li id="quote-li4"></li>
                            <li id="quote-li5"></li>
                        </ul>
                    </details>
                </div>
            </div>
        </section>

        <section id="studies">
            <div class="content">
                <div class="cards">
                    <h2 id="studies-title"></h2>
                    <article class="card-study">
                        <h3 id="study1-title"></h3>
                        <p id="study1-desc"></p>
                        <div class="degrees">
                            <h2 id="study1-degree1"></h2>
                            <p id="study1-degree1-desc"></p>
                        </div>
                        <div class="degrees">
                            <h2 id="study1-degree2"></h2>
                            <p id="study1-degree2-desc"></p>
                        </div>
                    </article>
                    <article class="card-study">
                        <h3 id="study2-title"></h3>
                        <p id="study2-desc"></p>
                        <div class="degrees">
                            <h2 id="study2-degree1"></h2>
                            <p id="study2-degree1-desc"></p>
                        </div>
                        <div class="degrees">
                            <h2 id="study2-degree2"></h2>
                            <p id="study2-degree2-desc"></p>
                        </div>
                    </article>
                </div>
            </div>
        </section>

        <section id="resume">
            <div class="content">
                <h2 id="resume-title"></h2>
                <ul>
                    <li id="resume-li1"></li>
                    <li id="resume-li2"></li>
                    <li id="resume-li3"></li>
                    <li id="resume-li4"></li>

                <h3 id="resume-cta"></h3>
            </div>
        </section>

        <section id="references">
            <div class="content">
                <h2 id="references-title"></h2>
                <p id="references-desc"></p>
                <div class="comments">
                    <article class="comment-card">
                        <h4 id="comment1-name"></h4>
                        <h5 id="comment1-biz"></h5>
                        <p id="comment1-text"></p>
                    </article>
                    <article class="comment-card">
                        <h4 id="comment2-name"></h4>
                        <h5 id="comment2-biz"></h5>
                        <p id="comment2-text"></p>
                    </article>
                    <article class="comment-card">
                        <h4 id="comment3-name"></h4>
                        <h5 id="comment3-biz"></h5>
                        <p id="comment3-text"></p>
                    </article>
                </div>
            </div>
        </section>

        <section id="contact">
            <h1 id="contact-title"></h1>
            <div class="contact-it">
                <h2 id="contact-manager"></h2>
                <div class="content">
                    <a id="contact-manager-whatsapp" href="https://wa.me/554888645497"></a>
                    <a id="contact-manager-email" href="mailto:Lourdesmarianamachuca@gmail.com"></a>
                </div>
            </div>
            <div class="contact-it">
                <h2 id="contact-dev"></h2>
                <div class="content">
                    <a id="contact-dev-whatsapp" href="https://wa.me/554888648031"></a>
